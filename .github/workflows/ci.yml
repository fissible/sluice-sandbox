name: CI

on:
  push:
    branches:
      - main
      - staging
      - production
  pull_request:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Smoke check
        run: |
          test -f README.md
          echo "Sandbox CI passed for $GITHUB_SHA"
